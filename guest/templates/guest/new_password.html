<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create New Password — SmartDerm</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --blue:       #2563eb;
  --blue-dark:  #1d4ed8;
  --blue-light: #3b82f6;
  --blue-pale:  #eff4ff;
  --blue-ghost: #f5f8ff;
  --sky:        #0ea5e9;
  --bg:         #f1f4fb;
  --white:      #ffffff;
  --text:       #1a2a4a;
  --text-mid:   #3a5070;
  --text-muted: #7a90b0;
  --border:     rgba(37,99,235,.14);
  --border-tan: #dce6f5;
  --shadow:     0 20px 60px rgba(37,99,235,.11), 0 4px 16px rgba(0,0,0,.05);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 0% 0%, rgba(37,99,235,.08) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(14,165,233,.07) 0%, transparent 55%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1' fill='%232563eb' fill-opacity='0.05'/%3E%3C/svg%3E");
  background-size: auto, auto, 40px 40px;
}

.wrapper {
  width: 100%;
  max-width: 420px;
  animation: rise .7s cubic-bezier(.16,1,.3,1) both;
}

@keyframes rise {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Card header ── */
.card-header {
  background: linear-gradient(125deg, var(--blue-dark) 0%, var(--blue) 55%, var(--sky) 100%);
  border-radius: 20px 20px 0 0;
  padding: 32px 36px 28px;
  position: relative;
  overflow: hidden;
  text-align: center;
}

.card-header .dots {
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='36' height='36' viewBox='0 0 36 36' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='18' cy='18' r='1' fill='white' fill-opacity='0.07'/%3E%3C/svg%3E") repeat;
  background-size: 36px 36px;
  pointer-events: none;
}

.card-header .orb1 {
  position: absolute; right: -40px; top: -40px;
  width: 160px; height: 160px; border-radius: 50%;
  background: rgba(255,255,255,.06); pointer-events: none;
}
.card-header .orb2 {
  position: absolute; left: -30px; bottom: -50px;
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,.04); pointer-events: none;
}

.header-brand {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 18px;
}

.brand-mark {
  width: 36px; height: 36px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}

.brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 19px; font-weight: 400;
  color: white; letter-spacing: -.01em;
}
.brand-name span { color: rgba(255,255,255,.75); font-style: italic; }

.header-eyebrow {
  position: relative; z-index: 1;
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 100px;
  padding: 4px 12px; margin-bottom: 14px;
  font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,.85);
}

.eyebrow-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,.9);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity:1; transform:scale(1); }
  50% { opacity:.5; transform:scale(.8); }
}

.card-header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 26px; font-weight: 400;
  color: white; letter-spacing: -.02em;
  position: relative; z-index: 1; line-height: 1.2;
}

.card-header h1 em { font-style: italic; color: rgba(255,255,255,.8); }

.card-header p {
  font-size: 13px; color: rgba(255,255,255,.62);
  margin-top: 5px; position: relative; z-index: 1;
}

/* ── Card body ── */
.card {
  background: var(--white);
  border-radius: 0 0 20px 20px;
  box-shadow: var(--shadow);
  padding: 36px;
}

/* ── Password strength bar ── */
.strength-wrap {
  margin-top: 8px;
}
.strength-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--border-tan);
  overflow: hidden;
  margin-bottom: 4px;
}
.strength-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width .35s ease, background .35s ease;
}
.strength-label {
  font-size: 11px; color: var(--text-muted);
  font-weight: 500;
}

/* ── Field ── */
.field {
  margin-bottom: 18px;
  animation: fadeSlide .5s ease both;
}
.field:nth-child(1) { animation-delay:.08s; }
.field:nth-child(2) { animation-delay:.15s; }

@keyframes fadeSlide {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

.field-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--text-mid); margin-bottom: 7px;
  display: block;
}

.input-wrap { position: relative; }

.input-icon {
  position: absolute; left: 13px; top: 50%;
  transform: translateY(-50%);
  font-size: 15px; color: var(--text-muted);
  pointer-events: none; line-height: 1;
}

.toggle-icon {
  position: absolute; right: 13px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px; color: var(--text-muted);
  cursor: pointer; line-height: 1;
  padding: 4px;
  transition: color .15s;
}
.toggle-icon:hover { color: var(--blue); }

.field input {
  width: 100%;
  padding: 12px 40px 12px 40px;
  border: 1.5px solid var(--border-tan);
  border-radius: 10px;
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  color: var(--text); background: var(--blue-ghost);
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.field input::placeholder { color: var(--text-muted); font-weight: 300; }
.field input:focus {
  border-color: var(--blue);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(37,99,235,.09);
}
.field input.match-ok  { border-color: #22c55e; }
.field input.match-err { border-color: #ef4444; }

/* ── Requirements list ── */
.req-list {
  margin-top: 10px;
  display: flex; flex-direction: column; gap: 4px;
  animation: fadeSlide .5s .12s ease both;
}
.req-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: var(--text-muted);
  transition: color .2s;
}
.req-item.met { color: #16a34a; }
.req-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border-tan);
  flex-shrink: 0;
  transition: background .2s;
}
.req-item.met .req-dot { background: #22c55e; }

/* ── Buttons ── */
.btn-group {
  display: flex; gap: 10px; margin-top: 26px;
  animation: fadeSlide .5s .25s ease both;
}

.btn {
  flex: 1; padding: 13px;
  border: none; border-radius: 11px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  cursor: pointer; transition: all .22s ease;
}

.btn-primary {
  background: linear-gradient(135deg, var(--blue), var(--blue-dark));
  color: white; flex: 2;
  box-shadow: 0 6px 20px rgba(37,99,235,.3);
  position: relative; overflow: hidden;
}
.btn-primary::after {
  content: '';
  position: absolute; top:0; left:-100%; width:100%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
  transition: left .45s ease;
}
.btn-primary:hover::after { left:100%; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(37,99,235,.4); }
.btn-primary:active { transform:translateY(0); }

.btn-secondary {
  background: var(--blue-ghost); color: var(--text-mid);
  border: 1.5px solid var(--border-tan);
}
.btn-secondary:hover { background: var(--border-tan); color: var(--text); }

/* ── Footer ── */
.form-footer {
  text-align: center; margin-top: 22px;
  font-size: 12px; color: var(--text-muted);
  animation: fadeSlide .5s .32s ease both;
}
.form-footer a { color: var(--blue); font-weight: 600; text-decoration: none; }
.form-footer a:hover { text-decoration: underline; }

/* ── Bottom accent strip ── */
.accent-strip {
  height: 3px;
  background: linear-gradient(90deg, var(--blue-dark), var(--blue), var(--sky));
  border-radius: 0 0 20px 20px;
  margin: 28px -36px -36px;
}

@media (max-width: 460px) {
  .card { padding: 26px 20px; }
  .card-header { padding: 26px 20px 22px; }
  .accent-strip { margin: 24px -20px -26px; }
}
</style>
</head>
<body>

<div class="wrapper">

  <div class="card-header">
    <div class="dots"></div>
    <div class="orb1"></div>
    <div class="orb2"></div>

    <div class="header-brand">
      <div class="brand-mark">🏥</div>
      <span class="brand-name">Smart<span>Derm</span></span>
    </div>

    <div class="header-eyebrow">
      <span class="eyebrow-dot"></span> Password Reset
    </div>

    <h1>Create <em>new</em> password</h1>
    <p>Choose a strong password to protect your account</p>
  </div>

  <div class="card">
    <form method="POST" action="">
      {% csrf_token %}

      <!-- New Password -->
      <div class="field">
        <label class="field-label" for="new_password">New Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" name="new_password" id="new_password" placeholder="Enter new password" required oninput="checkStrength(this.value); checkMatch();">
          <span class="toggle-icon" onclick="toggleVis('new_password', this)">👁</span>
        </div>

        <!-- Strength bar -->
        <div class="strength-wrap">
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <span class="strength-label" id="strengthLabel">Enter a password</span>
        </div>

        <!-- Requirements -->
        <div class="req-list">
          <div class="req-item" id="req-len"><span class="req-dot"></span>At least 8 characters</div>
          <div class="req-item" id="req-upper"><span class="req-dot"></span>One uppercase letter</div>
          <div class="req-item" id="req-num"><span class="req-dot"></span>One number</div>
          <div class="req-item" id="req-special"><span class="req-dot"></span>One special character</div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label class="field-label" for="confirm_password">Confirm Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" name="confirm_password" id="confirm_password" placeholder="Re-enter new password" required oninput="checkMatch();">
          <span class="toggle-icon" onclick="toggleVis('confirm_password', this)">👁</span>
        </div>
      </div>

      <div class="btn-group">
        <button type="reset" class="btn btn-secondary" onclick="resetUI()">Cancel</button>
        <button type="submit" class="btn btn-primary">Update Password →</button>
      </div>
    </form>

    <div class="form-footer">
      Remember your password? <a href="{% url 'webguest:login' %}">Back to login</a>
    </div>

    <div class="accent-strip"></div>
  </div>

</div>

<script>
  function toggleVis(id, icon) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = '🙈';
    } else {
      input.type = 'password';
      icon.textContent = '👁';
    }
  }

  function checkStrength(val) {
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');

    const checks = {
      len:     val.length >= 8,
      upper:   /[A-Z]/.test(val),
      num:     /[0-9]/.test(val),
      special: /[^A-Za-z0-9]/.test(val),
    };

    // Update requirement dots
    document.getElementById('req-len').classList.toggle('met', checks.len);
    document.getElementById('req-upper').classList.toggle('met', checks.upper);
    document.getElementById('req-num').classList.toggle('met', checks.num);
    document.getElementById('req-special').classList.toggle('met', checks.special);

    const score = Object.values(checks).filter(Boolean).length;
    const levels = [
      { w: '0%',   c: '#dce6f5', t: 'Enter a password' },
      { w: '25%',  c: '#ef4444', t: 'Weak' },
      { w: '50%',  c: '#f97316', t: 'Fair' },
      { w: '75%',  c: '#eab308', t: 'Good' },
      { w: '100%', c: '#22c55e', t: 'Strong' },
    ];
    const lvl = val.length === 0 ? levels[0] : levels[score];
    fill.style.width      = lvl.w;
    fill.style.background = lvl.c;
    label.textContent     = lvl.t;
    label.style.color     = val.length === 0 ? 'var(--text-muted)' : lvl.c;
  }

  function checkMatch() {
    const p1 = document.getElementById('new_password').value;
    const p2 = document.getElementById('confirm_password');
    if (!p2.value) { p2.className = ''; return; }
    if (p1 === p2.value) {
      p2.classList.add('match-ok');
      p2.classList.remove('match-err');
    } else {
      p2.classList.add('match-err');
      p2.classList.remove('match-ok');
    }
  }

  function resetUI() {
    document.getElementById('strengthFill').style.width = '0%';
    document.getElementById('strengthLabel').textContent = 'Enter a password';
    document.getElementById('strengthLabel').style.color = 'var(--text-muted)';
    ['req-len','req-upper','req-num','req-special'].forEach(id =>
      document.getElementById(id).classList.remove('met'));
    document.getElementById('confirm_password').className = '';
  }
</script>

</body>
</html>

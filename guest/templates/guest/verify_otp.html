<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --blue:       #2563eb;
  --blue-dark:  #1d4ed8;
  --blue-light: #3b82f6;
  --blue-pale:  #eff4ff;
  --blue-ghost: #f5f8ff;
  --sky:        #0ea5e9;
  --bg:         #f1f4fb;
  --white:      #ffffff;
  --text:       #1a2a4a;
  --text-mid:   #3a5070;
  --text-muted: #7a90b0;
  --border:     rgba(37,99,235,.14);
  --border-tan: #dce6f5;
  --red:        #ef4444;
  --shadow:     0 20px 60px rgba(37,99,235,.10), 0 4px 16px rgba(0,0,0,.04);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 0% 0%, rgba(37,99,235,.07) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(14,165,233,.06) 0%, transparent 55%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1' fill='%232563eb' fill-opacity='0.05'/%3E%3C/svg%3E");
  background-size: auto, auto, 40px 40px;
}

.wrapper {
  width: 100%;
  max-width: 420px;
  animation: rise .7s cubic-bezier(.16,1,.3,1) both;
}

@keyframes rise {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Header ── */
.card-header {
  background: linear-gradient(125deg, var(--blue-dark) 0%, var(--blue) 55%, var(--sky) 100%);
  border-radius: 20px 20px 0 0;
  padding: 32px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.card-header::before {
  content: '';
  position: absolute; right: -30px; top: -30px;
  width: 160px; height: 160px; border-radius: 50%;
  background: rgba(255,255,255,.06);
}

.card-header::after {
  content: '';
  position: absolute; left: -20px; bottom: -40px;
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,.04);
}

.card-header .dots {
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='36' height='36' viewBox='0 0 36 36' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='18' cy='18' r='1' fill='white' fill-opacity='0.07'/%3E%3C/svg%3E") repeat;
  background-size: 36px 36px;
  pointer-events: none;
}

.header-icon-wrap {
  position: relative; z-index: 1;
  width: 64px; height: 64px;
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin: 0 auto 16px;
}

.card-header h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; font-weight: 400;
  color: white; letter-spacing: -.01em;
  position: relative; z-index: 1;
}

.card-header p {
  font-size: 13px; color: rgba(255,255,255,.65);
  margin-top: 5px; font-weight: 300;
  position: relative; z-index: 1;
}

/* ── Card body ── */
.card {
  background: var(--white);
  border-radius: 0 0 20px 20px;
  box-shadow: var(--shadow);
  padding: 36px;
}

/* ── OTP input group ── */
.otp-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--text-mid);
  display: block; margin-bottom: 10px;
}

.otp-input-wrap {
  position: relative;
}

.otp-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 16px; color: var(--text-muted); pointer-events: none;
  z-index: 1;
}

input[type="text"] {
  width: 100%;
  padding: 14px 14px 14px 42px;
  border: 1.5px solid var(--border-tan);
  border-radius: 12px;
  font-size: 20px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  letter-spacing: .35em;
  color: var(--text);
  background: var(--blue-ghost);
  outline: none;
  text-align: center;
  padding-left: 14px;
  transition: border-color .2s, box-shadow .2s, background .2s;
}

input[type="text"]:focus {
  border-color: var(--blue);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(37,99,235,.09);
}

input[type="text"]::placeholder {
  color: var(--text-muted);
  font-weight: 300;
  letter-spacing: .05em;
  font-size: 15px;
}

/* ── Timer hint ── */
.otp-hint {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
}

.otp-hint-text {
  font-size: 12px; color: var(--text-muted);
}

.resend-link {
  font-size: 12px; font-weight: 600;
  color: var(--blue); text-decoration: none;
  transition: opacity .15s;
}
.resend-link:hover { opacity: .75; text-decoration: underline; }

/* ── Error message ── */
.error-msg {
  display: flex; align-items: center; gap: 8px;
  background: rgba(239,68,68,.07);
  border: 1px solid rgba(239,68,68,.2);
  border-radius: 10px;
  padding: 11px 14px;
  margin-top: 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--red);
  animation: shake .4s ease;
}

.error-msg::before { content: '⚠'; font-size: 14px; flex-shrink: 0; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-5px); }
  40%       { transform: translateX(5px); }
  60%       { transform: translateX(-4px); }
  80%       { transform: translateX(4px); }
}

/* ── Submit button ── */
.btn-submit {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px;
  margin-top: 24px;
  background: linear-gradient(135deg, var(--blue), var(--blue-dark));
  color: white; border: none; border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 700;
  letter-spacing: .04em; cursor: pointer;
  box-shadow: 0 6px 20px rgba(37,99,235,.3);
  transition: all .22s ease;
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(37,99,235,.4);
}

.btn-submit:active { transform: translateY(0); }

/* ── Back link ── */
.back-link {
  display: block; text-align: center;
  margin-top: 18px; font-size: 13px; color: var(--text-muted);
}

.back-link a {
  color: var(--blue); text-decoration: none; font-weight: 600;
}
.back-link a:hover { text-decoration: underline; }

/* ── Divider ── */
.divider {
  height: 1px; background: var(--border);
  margin: 22px 0;
}

/* ── Security note ── */
.security-note {
  display: flex; align-items: center; gap: 9px;
  background: var(--blue-ghost);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 12px; color: var(--text-muted); line-height: 1.5;
}
.security-note .lock { font-size: 16px; flex-shrink: 0; }

@media (max-width: 480px) {
  .card { padding: 24px 20px; }
  .card-header { padding: 26px 20px; }
}
</style>
</head>
<body>

<div class="wrapper">

  <!-- Header -->
  <div class="card-header">
    <div class="dots"></div>
    <div class="header-icon-wrap">🔐</div>
    <h2>Enter OTP</h2>
    <p>A verification code was sent to your registered mail</p>
  </div>

  <!-- Form -->
  <div class="card">
    <form method="post">
      {% csrf_token %}

      <label class="otp-label">Verification Code</label>
      <div class="otp-input-wrap">
        <input type="text" name="otp" placeholder="Enter OTP" maxlength="6" autocomplete="one-time-code" required>
      </div>

      <div class="otp-hint">
        <span class="otp-hint-text">Code expires in 10:00</span>
        <a href="{% url 'webguest:resend_otp' %}" class="resend-link">Resend OTP</a>
      </div>

      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}

      <button type="submit" class="btn-submit">
        ✓ &nbsp;Verify &amp; Continue
      </button>
    </form>

    <div class="divider"></div>

    <div class="security-note">
      <span class="lock">🔒</span>
      Your OTP is confidential. We will never ask you to share it with anyone.
    </div>

    <p class="back-link">
      Wrong account? <a href="{% url 'webguest:registration' %}">Go back</a>
    </p>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Registration — SmartDerm</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --blue:        #2563eb;
  --blue-dark:   #1d4ed8;
  --blue-light:  #3b82f6;
  --blue-pale:   #eff4ff;
  --blue-ghost:  #f5f8ff;
  --sky:         #0ea5e9;
  --bg:          #f1f4fb;
  --white:       #ffffff;
  --text:        #1a2a4a;
  --text-mid:    #3a5070;
  --text-muted:  #7a90b0;
  --border:      rgba(37,99,235,.14);
  --border-tan:  #dce6f5;
  --shadow:      0 20px 60px rgba(37,99,235,.10), 0 4px 16px rgba(0,0,0,.04);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* ── Navbar ── */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 58px;
  background: rgba(255,255,255,.82);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(37,99,235,.10);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  box-shadow: 0 2px 16px rgba(37,99,235,.07);
}

.nav-brand {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none;
}
.nav-brand-mark {
  width: 32px; height: 32px; border-radius: 9px;
  background: linear-gradient(135deg, var(--blue), var(--sky));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.nav-brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 17px; font-weight: 400;
  color: var(--text); letter-spacing: -.01em;
}
.nav-brand-name span { color: var(--blue); font-style: italic; }

.nav-actions { display: flex; align-items: center; gap: 10px; }

.nav-btn-home {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px;
  background: linear-gradient(135deg, var(--blue), var(--blue-dark));
  color: white; border: none; border-radius: 9px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  text-decoration: none; cursor: pointer;
  box-shadow: 0 4px 12px rgba(37,99,235,.28);
  transition: all .2s ease;
  white-space: nowrap;
}
.nav-btn-home:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(37,99,235,.36); }
.nav-btn-home:active { transform: translateY(0); }
.nav-btn-home svg { width: 14px; height: 14px; flex-shrink: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 78px 20px 40px;
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 0% 0%, rgba(37,99,235,.07) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(14,165,233,.06) 0%, transparent 55%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1' fill='%232563eb' fill-opacity='0.05'/%3E%3C/svg%3E");
  background-size: auto, auto, 40px 40px;
}

.wrapper {
  width: 100%;
  max-width: 640px;
  animation: rise .7s cubic-bezier(.16,1,.3,1) both;
}

@keyframes rise {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Header ── */
.card-header {
  display: flex;
  align-items: center;
  gap: 18px;
  background: linear-gradient(125deg, var(--blue-dark) 0%, var(--blue) 55%, var(--sky) 100%);
  border-radius: 20px 20px 0 0;
  padding: 28px 36px;
  position: relative;
  overflow: hidden;
}

.card-header::before {
  content: '';
  position: absolute; right: -30px; top: -30px;
  width: 160px; height: 160px; border-radius: 50%;
  background: rgba(255,255,255,.06);
}

.card-header::after {
  content: '';
  position: absolute; right: 60px; bottom: -50px;
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,.04);
}

.card-header .dots {
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='36' height='36' viewBox='0 0 36 36' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='18' cy='18' r='1' fill='white' fill-opacity='0.07'/%3E%3C/svg%3E") repeat;
  background-size: 36px 36px;
  pointer-events: none;
}

.header-icon {
  width: 48px; height: 48px;
  background: rgba(255,255,255,.15);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,.22);
  position: relative; z-index: 1;
}

.header-text { position: relative; z-index: 1; }

.header-text h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; font-weight: 400;
  color: white; letter-spacing: -.01em;
}

.header-text p {
  font-size: 13px;
  color: rgba(255,255,255,.65);
  margin-top: 3px; font-weight: 300;
}

/* ── Step bar ── */
.step-bar {
  background: var(--blue-dark);
  padding: 11px 36px;
  display: flex; align-items: center; gap: 10px;
}

.step-bar-label {
  font-size: 11px; color: rgba(255,255,255,.55);
  letter-spacing: .08em; text-transform: uppercase; font-weight: 600;
  white-space: nowrap;
}

.step-track {
  flex: 1; display: flex; gap: 4px;
}

.step-seg {
  flex: 1; height: 4px; border-radius: 4px;
  background: rgba(255,255,255,.2);
}
.step-seg.active { background: white; }

/* ── Card ── */
.card {
  background: var(--white);
  border-radius: 0 0 20px 20px;
  box-shadow: var(--shadow);
  padding: 36px;
}

/* ── Section label ── */
.section-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--blue);
  margin: 26px 0 14px;
  display: flex; align-items: center; gap: 10px;
}
.section-label:first-child { margin-top: 0; }
.section-label::after { content:''; flex:1; height:1px; background: var(--border); }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px 18px;
}
.full { grid-column: span 2; }

.form-group {
  display: flex; flex-direction: column;
  animation: fadeSlide .5s ease both;
}

@keyframes fadeSlide {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

.form-group:nth-child(1) { animation-delay:.05s; }
.form-group:nth-child(2) { animation-delay:.10s; }
.form-group:nth-child(3) { animation-delay:.15s; }
.form-group:nth-child(4) { animation-delay:.20s; }
.form-group:nth-child(5) { animation-delay:.25s; }
.form-group:nth-child(6) { animation-delay:.30s; }

label {
  font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-mid); margin-bottom: 7px;
}

input[type="text"],
input[type="number"],
input[type="email"],
input[type="password"],
textarea {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--border-tan);
  border-radius: 10px;
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  font-weight: 400; color: var(--text);
  background: var(--blue-ghost);
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}

input::placeholder, textarea::placeholder { color: var(--text-muted); font-weight: 300; }

input:focus, textarea:focus {
  border-color: var(--blue);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(37,99,235,.09);
}

textarea { resize: none; }

/* ── Gender radio ── */
.gender-group { display: flex; gap: 10px; flex-wrap: wrap; }

.gender-option { flex: 1; min-width: 70px; }
.gender-option input[type="radio"] { display: none; }

.gender-option label {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 10px;
  border: 1.5px solid var(--border-tan);
  border-radius: 10px;
  background: var(--blue-ghost);
  font-size: 13px; font-weight: 500;
  letter-spacing: .03em; text-transform: none;
  color: var(--text-mid); cursor: pointer;
  transition: all .2s; white-space: nowrap;
}

.gender-option input[type="radio"]:checked + label {
  background: var(--blue-pale);
  border-color: var(--blue);
  color: var(--blue-dark);
  font-weight: 700;
  box-shadow: 0 0 0 3px rgba(37,99,235,.09);
}

.gender-option label:hover { border-color: var(--blue-light); color: var(--blue); }

/* ── Hint ── */
.hint {
  font-size: 11px; color: var(--text-muted);
  margin-top: 5px; font-weight: 400;
}

/* ── Buttons ── */
.btn-group {
  display: flex; gap: 12px; margin-top: 28px;
}

.btn {
  flex: 1; padding: 14px;
  border: none; border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: .04em; cursor: pointer;
  transition: all .22s ease;
}

.btn-primary {
  background: linear-gradient(135deg, var(--blue), var(--blue-dark));
  color: white;
  box-shadow: 0 6px 20px rgba(37,99,235,.3);
  flex: 2;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37,99,235,.4); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: var(--blue-ghost);
  color: var(--text-mid);
  border: 1.5px solid var(--border-tan);
}
.btn-secondary:hover { background: var(--border-tan); color: var(--text); }

/* ── Footer ── */
.form-footer {
  text-align: center; margin-top: 20px;
  font-size: 12px; color: var(--text-muted);
}
.form-footer a { color: var(--blue); text-decoration: none; font-weight: 600; }
.form-footer a:hover { text-decoration: underline; }

@media (max-width: 500px) {
  .navbar { padding: 0 16px; }
  .grid { grid-template-columns: 1fr; }
  .full { grid-column: span 1; }
  .card { padding: 24px 20px; }
  .card-header { padding: 22px 20px; }
  .step-bar { padding: 10px 20px; }
}
</style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <a href="{% url 'webguest:home_page' %}" class="nav-brand">
    <div class="nav-brand-mark">🏥</div>
    <span class="nav-brand-name">Smart<span>Derm</span></span>
  </a>
  <div class="nav-actions">
    <a href="{% url 'webguest:home_page' %}" class="nav-btn-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      Home
    </a>
  </div>
</nav>

<div class="wrapper">

  <!-- Header -->
  <div class="card-header">
    <div class="dots"></div>
    <div class="header-icon">🏥</div>
    <div class="header-text">
      <h2>Patient Registration</h2>
      <p>Please enter the patient details accurately</p>
    </div>
  </div>

  <!-- Step bar -->
  <div class="step-bar">
    <span class="step-bar-label">Step 1 of 1</span>
    <div class="step-track">
      <div class="step-seg active"></div>
      <div class="step-seg"></div>
      <div class="step-seg"></div>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <form method="post" onsubmit="return validateForm()">
      {% csrf_token %}

      <div class="section-label">Personal Information</div>
      <div class="grid">
        <div class="form-group full">
          <label>Full Name</label>
          <input type="text" name="txt_name" placeholder="Full Name" autocomplete="off">
        </div>

        <div class="form-group full">
          <label>Address</label>
          <textarea name="txt_address" rows="2" placeholder="Enter Address" autocomplete="off"></textarea>
        </div>

        <div class="form-group">
          <label>Age</label>
          <input type="number" name="txt_age" placeholder="Years" autocomplete="off">
        </div>

        <div class="form-group">
          <label>Gender</label>
          <div class="gender-group">
            <div class="gender-option">
              <input type="radio" name="txt_gender" id="male" value="M">
              <label for="male">♂ Male</label>
            </div>
            <div class="gender-option">
              <input type="radio" name="txt_gender" id="female" value="F">
              <label for="female">♀ Female</label>
            </div>
            <div class="gender-option">
              <input type="radio" name="txt_gender" id="other" value="O">
              <label for="other">◎ Other</label>
            </div>
          </div>
        </div>
      </div>

      <div class="section-label">Contact Details</div>
      <div class="grid">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="number" name="txt_phone" placeholder="+91 XXXXX XXXXX" autocomplete="off">
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="txt_email" placeholder="example@mail.com" autocomplete="off">
        </div>
      </div>

      <div class="section-label">Account Security</div>
      <div class="grid">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="txt_password" placeholder="Min. 8 characters" autocomplete="off">
          <span class="hint">Use letters, numbers &amp; symbols</span>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="txt_repassword" placeholder="Re-enter password" autocomplete="new-password">
        </div>
      </div>

      <div class="btn-group">
        <button type="reset" class="btn btn-secondary">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Account →</button>
      </div>
    </form>

    <div class="form-footer">
      Already have an account? <a href="{% url 'webguest:login' %}">Sign in here</a>
    </div>
  </div>

</div>
<script>

function validateForm(){

  let name = document.querySelector('[name="txt_name"]').value.trim();
  let age = document.querySelector('[name="txt_age"]').value;
  let phone = document.querySelector('[name="txt_phone"]').value;
  let email = document.querySelector('[name="txt_email"]').value;
  let password = document.querySelector('[name="txt_password"]').value;
  let repassword = document.querySelector('[name="txt_repassword"]').value;

  let namePattern = /^[A-Za-z\s]+$/;
  let phonePattern = /^[0-9]{10}$/;
  let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if(!namePattern.test(name)){
    alert("Name should contain only letters");
    return false;
  }

  if(age <= 0 || age > 120){
    alert("Enter a valid Age");
    return false;
  }

  if(!phonePattern.test(phone)){
    alert("Phone number must be exactly 10 digits");
    return false;
  }

  if(!emailPattern.test(email)){
    alert("Enter a valid email address");
    return false;
  }

  if(password.length < 8){
    alert("Password must be at least 8 characters");
    return false;
  }

  if(password !== repassword){
    alert("Passwords do not match");
    return false;
  }

  return true;
}

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Skin Disease Classifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .preview-img { max-height: 300px; object-fit: cover; border-radius: 10px; }
        .confidence-bar { height: 25px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h2 class="text-center mb-4 text-primary">AI Skin Disease Classifier</h2>
                
                <form method="POST" enctype="multipart/form-data" class="mb-4">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="skin_image" class="form-label">Upload a clear image of the skin lesion:</label>
                        <input class="form-control form-control-lg" type="file" id="skin_image" name="skin_image" accept="image/*" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Analyze Image</button>
                    </div>
                </form>

                {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                {% if predicted_class %}
                <hr>
                <div class="row mt-4 text-center">
                    <div class="col-md-6 mb-3">
                        <h5>Uploaded Image:</h5>
                        <img src="{{ image_url }}" alt="Uploaded Skin Lesion" class="img-fluid preview-img border">
                    </div>
                    
                    <div class="col-md-6 d-flex flex-column justify-content-center">
                        <h4 class="text-muted">Prediction:</h4>
                        <h2 class="text-danger fw-bold">{{ predicted_class }}</h2>
                        
                        <div class="mt-3 text-start">
                            <p class="mb-1 fw-bold text-muted">Confidence: {{ confidence }}%</p>
                            <div class="progress">
                                <div class="progress-bar progress-bar-striped progress-bar-animated bg-{% if confidence > 80 %}success{% elif confidence > 50 %}warning{% else %}danger{% endif %}" 
                                     role="progressbar" 
                                     style="width: {{ confidence }}%;" 
                                     aria-valuenow="{{ confidence }}" aria-valuemin="0" aria-valuemax="100">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                {% endif %}
                
            </div>
        </div>
    </div>
</div>

</body>
</html>

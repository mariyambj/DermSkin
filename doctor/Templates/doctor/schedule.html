

{% block content %}
<style>
    .schedule-wrapper {
        max-width: 600px;
        margin: 40px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .schedule-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .schedule-header h2 {
        color: #2c3e50;
        margin-bottom: 5px;
    }

    .schedule-header p {
        color: #7f8c8d;
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #34495e;
    }

    .form-control {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ced4da;
        border-radius: 6px;
        font-size: 1rem;
        box-sizing: border-box;
        transition: border-color 0.15s ease-in-out;
    }

    .form-control:focus {
        border-color: #3498db;
        outline: none;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
    }

    .time-row {
        display: flex;
        gap: 15px;
    }

    .time-row .form-group {
        flex: 1;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background-color: #2980b9;
    }

    .messages {
        margin-bottom: 20px;
        padding: 10px;
        border-radius: 6px;
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
</style>

<div class="schedule-wrapper">
    <div class="schedule-header">
        <h2>Generate Daily Tokens</h2>
        <p>Set your working hours to automatically generate patient tokens.</p>
    </div>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p style="margin: 0;">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="POST" action="{% url 'webdoctor:doctor_schedule' %}">
        {% csrf_token %}
        
        <div class="time-row">
            <div class="form-group">
                <label for="schedule_date">Date</label>
                <input type="date" id="schedule_date" name="schedule_date" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="day_of_week">Day of Week</label>
                <select id="day_of_week" name="day_of_week" class="form-control" required>
                    <option value="" disabled selected>Select Day</option>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
            </div>
        </div>

        <div class="time-row">
            <div class="form-group">
                <label for="start_time">Shift Start Time</label>
                <input type="time" id="start_time" name="start_time" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="end_time">Shift End Time</label>
                <input type="time" id="end_time" name="end_time" class="form-control" required>
            </div>
        </div>

        <div class="time-row">
            <div class="form-group">
                <label for="break_start_time">Break Start (Optional)</label>
                <input type="time" id="break_start_time" name="break_start_time" class="form-control">
            </div>

            <div class="form-group">
                <label for="break_end_time">Break End (Optional)</label>
                <input type="time" id="break_end_time" name="break_end_time" class="form-control">
            </div>
        </div>

        <div class="time-row">
            <div class="form-group">
                <label for="consultation_duration">Avg. Mins per Patient</label>
                <input type="number" id="consultation_duration" name="consultation_duration" class="form-control" value="15" min="5" required>
            </div>

            <div class="form-group">
                <label for="total_patients">Total Tokens to Generate</label>
                <input type="number" id="total_patients" name="total_patients" class="form-control" min="1" placeholder="e.g., 20" required>
            </div>
        </div>

        <button type="submit" class="btn-submit">Generate Schedule & Tokens</button>
    </form>
</div>

<script>
    document.getElementById('schedule_date').addEventListener('change', function() {
        const dateString = this.value;
        if(dateString) {
            const date = new Date(dateString);
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = days[date.getDay()];
            document.getElementById('day_of_week').value = dayName;
        }
    });
</script>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
        }

        h1{
            background:#2c3e50;
            color:white;
            padding:15px;
        }

        .container{
            margin-top:40px;
        }

        .card{
            display:inline-block;
            width:200px;
            padding:20px;
            margin:15px;
            background:white;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        a{
            text-decoration:none;
            font-weight:bold;
            color:#2c3e50;
        }

        .card:hover{
            background:#ecf0f1;
        }
    </style>

</head>

<body>

<h1>Clinic Admin Dashboard</h1>

<div class="container">

    <div class="card">
        <a href="#">Add Doctor</a>
    </div>

    <div class="card">
        <a href="#">View Doctors</a>
    </div>

    <div class="card">
        <a href="#">Manage Schedule</a>
    </div>

    <div class="card">
        <a href="#">View Patients</a>
    </div>

    <div class="card">
        <a href="#">Appointments</a>
    </div>

    <div class="card">
        <a href="#">Logout</a>
    </div>

</div>

</body>
</html>

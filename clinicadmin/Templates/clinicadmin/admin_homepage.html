<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:       #3b52d4;
    --blue-dark:  #2c3fb5;
    --purple:     #7c3aed;
    --purple-lite:#a855f7;
    --red:        #ef4444;
    --bg:         #f1f3f9;
    --white:      #ffffff;
    --text:       #1a2035;
    --text-mid:   #4b5675;
    --text-muted: #9ca3af;
    --border:     #e2e6f0;
    --shadow:     0 2px 12px rgba(59,82,212,.08), 0 1px 3px rgba(0,0,0,.05);
    --shadow-md:  0 8px 28px rgba(59,82,212,.13), 0 2px 8px rgba(0,0,0,.06);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Navbar ── */
  .navbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    height: 58px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
  }

  .brand-mark {
    width: 33px; height: 33px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 3px 10px rgba(59,82,212,.28);
  }

  .brand-name {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .nav-link {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-mid);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 8px;
    transition: all .15s;
  }
  .nav-link:hover, .nav-link.active {
    color: var(--blue);
    background: rgba(59,82,212,.07);
  }
  .nav-link.active { font-weight: 600; }

  .nav-right { display: flex; align-items: center; gap: 10px; }

  .notif-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 15px;
    position: relative;
    transition: border-color .15s;
  }
  .notif-btn:hover { border-color: var(--blue); }

  .notif-dot {
    position: absolute; top: 5px; right: 5px;
    width: 7px; height: 7px;
    background: var(--red);
    border-radius: 50%;
    border: 1.5px solid white;
  }

  .user-pill {
    display: flex; align-items: center; gap: 7px;
    padding: 3px 11px 3px 3px;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    cursor: pointer;
    background: var(--white);
    transition: border-color .15s;
  }
  .user-pill:hover { border-color: var(--blue); }

  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .user-pill span { font-size: 13px; font-weight: 600; color: var(--text); }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(125deg, var(--blue-dark) 0%, var(--blue) 35%, var(--purple) 72%, var(--purple-lite) 100%);
    padding: 34px 40px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='56' height='56' viewBox='0 0 56 56' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='28' cy='28' r='1.2' fill='white' fill-opacity='0.055'/%3E%3C/svg%3E") repeat;
    background-size: 56px 56px;
    pointer-events: none;
  }

  .hero-orb, .hero-orb2 {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,.06);
    pointer-events: none;
  }
  .hero-orb  { width: 240px; height: 240px; top: -80px; right: -40px; }
  .hero-orb2 { width: 160px; height: 160px; bottom: -60px; right: 160px; background: rgba(255,255,255,.04); }

  .hero-content { position: relative; z-index: 1; }

  .hero h1 {
    font-size: 24px; font-weight: 700; color: white;
    letter-spacing: -.02em; margin-bottom: 6px;
  }
  .hero p { font-size: 14px; color: rgba(255,255,255,.68); }

  /* ── Main ── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 18px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    transition: all .2s;
    opacity: 0;
    animation: rise .4s ease forwards;
  }
  .stat-card:nth-child(1) { animation-delay: .06s; }
  .stat-card:nth-child(2) { animation-delay: .12s; }
  .stat-card:hover {
    border-color: var(--blue);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }

  .stat-icon-wrap {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .stat-icon-wrap.blue   { background: rgba(59,82,212,.10); }
  .stat-icon-wrap.green  { background: rgba(16,185,129,.10); }

  .stat-value {
    font-size: 22px; font-weight: 700; color: var(--text);
    font-family: 'DM Serif Display', serif; line-height: 1.2;
  }
  .stat-label {
    font-size: 11px; color: var(--text-muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: .06em; margin-top: 2px;
  }
  .stat-arrow { margin-left: auto; font-size: 15px; color: var(--text-muted); }

  /* ── Panel ── */
  .panel {
    max-width: 360px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    opacity: 0;
    animation: rise .4s .18s ease forwards;
  }

  .panel-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .panel-header h3 { font-size: 15px; font-weight: 700; color: var(--text); }

  .panel-body { padding: 16px; display: flex; flex-direction: column; gap: 8px; }

  /* ── Buttons ── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 11px 16px;
    border-radius: 10px; font-size: 14px; font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    text-decoration: none; cursor: pointer; border: none;
    transition: all .15s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    color: white;
    box-shadow: 0 3px 10px rgba(59,82,212,.25);
  }
  .btn-primary:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 5px 16px rgba(59,82,212,.3); }

  .btn-outline {
    background: var(--white);
    color: var(--blue);
    border: 1.5px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--blue); background: rgba(59,82,212,.04); }

  .btn-danger {
    background: var(--white);
    color: var(--red);
    border: 1.5px solid #fecaca;
    margin-top: 4px;
  }
  .btn-danger:hover { background: #fff5f5; border-color: var(--red); }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr; }
    .nav-links  { display: none; }
    .hero       { padding: 24px 20px; }
    .panel      { max-width: 100%; }
  }
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <a href="#" class="brand">
    <div class="brand-mark">🏥</div>
    <span class="brand-name">ClinicAdmin</span>
  </a>
  <nav class="nav-links">
    <a href="#" class="nav-link active">Dashboard</a>
    <a href="{% url 'webadmin:admin_doctor_list' %}" class="nav-link">Doctors</a>
  </nav>
  <div class="nav-right">
    <div class="notif-btn">🔔<span class="notif-dot"></span></div>
    <div class="user-pill">
      <div class="user-avatar">AD</div>
      <span>Admin</span>
    </div>
  </div>
</div>

<!-- Hero -->
<div class="hero">
  <div class="hero-orb"></div>
  <div class="hero-orb2"></div>
  <div class="hero-content">
    <h1>Admin Dashboard</h1>
    <p>Manage your clinic's doctors, patients, and appointments</p>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Stats -->
  <div class="stats-row">
    <a href="{% url 'webadmin:admin_doctor_list' %}" class="stat-card">
      <div class="stat-icon-wrap blue">🩺</div>
      <div>
        <div class="stat-value">{{ doctor_count }}</div>
        <div class="stat-label">Total Doctors</div>
      </div>
      <span class="stat-arrow">→</span>
    </a>
    <a href="#" class="stat-card">
      <div class="stat-icon-wrap green">🧑‍⚕️</div>
      <div>
        <div class="stat-value">{{ patient_count }}</div>
        <div class="stat-label">Total Patients</div>
      </div>
      <span class="stat-arrow">→</span>
    </a>
  </div>

  <!-- Quick Actions -->
  <div class="panel">
    <div class="panel-header">
      <span>⚡</span>
      <h3>Quick Actions</h3>
    </div>
    <div class="panel-body">
      <a href="{% url 'webadmin:doctor_registration' %}" class="btn btn-primary">➕ Add New Doctor</a>
      <a href="{% url 'webadmin:admin_doctor_list' %}" class="btn btn-outline">🩺 Doctor List</a>
      <a href="#" class="btn btn-danger">🚪 Logout</a>
    </div>
  </div>

</div>

</body>
</html>

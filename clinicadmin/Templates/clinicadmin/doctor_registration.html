
<!DOCTYPE html>
<html>
<head>
    <title>Doctor Registration</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f4f6f9;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            margin-top:40px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Doctor Registration</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Full Name</label>
        <input type="text" name="name" value="Dr. " required>

        <label>Age</label>
        <input type="number" name="age" required>

        <label>Gender</label>
        <select name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Others</optionvalue></option>
        </select>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Phone Number</label>
        <input type="text" name="phone_number" required>

        <label>Address</label>
        <textarea name="address"></textarea>

        <label>Profile Picture</label>
        <input type="file" name="profile_picture">

        <label>Identification Proof</label>
        <input type="file" name="identification_proof">

        <label>Specialization</label>
        <select name="specialization" required>
            <option value="">-- Select Specialization --</option>
            {% for value,label in specializations %}
                <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select>

        <label>Qualification</label>
        <input type="text" name="qualification">

        <label>Medical Registration Number</label>
        <input type="text" name="medical_registration_number">

        <button type="submit">Register Doctor</button>

    </form>

</div>

</body>
</html>

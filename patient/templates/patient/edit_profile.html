{% extends 'base/header.html' %}
{% block title %}Edit Profile | Patient | DermSkin{% endblock %}

{% block content %}
<div class="page-banner">
    <div class="container position-relative" style="z-index:1">
        <h1><i class="fas fa-user-edit me-2"></i>Edit Profile</h1>
        <p>Update your personal details</p>
    </div>
</div>

<div class="page-wrapper">
<div class="container">
<div class="row justify-content-center">
<div class="col-lg-6 col-md-8" data-aos="fade-up">

    <div class="ds-card">
        <div class="ds-card-header">
            <i class="fas fa-pen text-primary"></i> Update Information
        </div>
        <div class="ds-card-body">
            <form method="post">
                {% csrf_token %}

                <div class="row g-4">
                    <div class="col-12">
                        <label class="ds-form-label">Full Name</label>
                        <input type="text" name="txt_name" value="{{ patient.first_name }}" class="ds-form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="ds-form-label">Address</label>
                        <textarea name="txt_address" rows="3" class="ds-form-control">{{ patient.address }}</textarea>
                    </div>
                    <div class="col-sm-6">
                        <label class="ds-form-label">Phone</label>
                        <input type="text" name="txt_phone" value="{{ patient.phone }}" class="ds-form-control">
                    </div>
                    <div class="col-sm-6">
                        <label class="ds-form-label">Age</label>
                        <input type="number" name="txt_age" value="{{ patient.age }}" class="ds-form-control" min="0" max="120">
                    </div>
                    <div class="col-12">
                        <label class="ds-form-label">Gender</label>
                        <div class="d-flex gap-4 mt-1">
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.9rem;font-weight:500;color:var(--text-mid);">
                                <input type="radio" name="txt_gender" value="M" {% if patient.gender == "M" %}checked{% endif %} style="accent-color:var(--primary);">
                                Male
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.9rem;font-weight:500;color:var(--text-mid);">
                                <input type="radio" name="txt_gender" value="F" {% if patient.gender == "F" %}checked{% endif %} style="accent-color:var(--primary);">
                                Female
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.9rem;font-weight:500;color:var(--text-mid);">
                                <input type="radio" name="txt_gender" value="O" {% if patient.gender == "O" %}checked{% endif %} style="accent-color:var(--primary);">
                                Other
                            </label>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-3 mt-4 pt-3" style="border-top:1px solid var(--border);">
                    <button type="submit" class="btn-ds-primary">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <a href="{% url 'webpatient:patient_profile' %}" class="btn-ds-outline">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>
</div>
</div>
</div>
{% endblock %}

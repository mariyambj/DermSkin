<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .card {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: none;
        }

        .radio-group {
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .back-btn {
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            color: #3498db;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div>Edit Profile</div>
    <div>
        <a href="{% url 'webpatient:patient_homepage' %}" style="color:white; text-decoration:none;">Back to Home</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>Update Your Details</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="txt_name" value="{{ patient.first_name }}">
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="txt_address" rows="3">{{ patient.address }}</textarea>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="txt_phone" value="{{ patient.phone }}">
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="txt_age" value="{{ patient.age }}">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <input type="radio" name="txt_gender" value="M"
                        {% if patient.gender == "M" %}checked{% endif %}> Male

                    <input type="radio" name="txt_gender" value="F"
                        {% if patient.gender == "F" %}checked{% endif %}> Female

                    <input type="radio" name="txt_gender" value="O"
                        {% if patient.gender == "O" %}checked{% endif %}> Other
                </div>
            </div>

            <button type="submit" class="btn">Update Profile</button>
        </form>

    </div>
</div>

</body>
</html>

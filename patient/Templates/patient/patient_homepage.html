<!DOCTYPE html>
<html>
<head>
    <title>Patient Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }
        .container {
            padding: 40px;
        }
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn {
            text-decoration: none;
            color: white;
            background-color: #3498db;
            padding: 8px 12px;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div>Patient Dashboard</div>
    <div>
        Welcome, {{ patient.first_name }}
        <a href="{% url 'login' %}" class="btn" style="margin-left:15px;">Logout</a>
    </div>
</div>

<div class="container">

    <div class="card">
        <h2>Appointments</h2>
        <p>Welcome {{ patient.first_name }}</p>
    </div>
    <div class="card">
        <a href="{% url 'patient_profile' %}" class="btn" style="margin-left:15px;">My Profile</a>
        <a href="{% url 'change_password' %}" class="btn" style="margin-left:15px;">Change Password</a>
    </div>
    <div class="card">
        <h2>Medical Records</h2>
        <p>No medical records available.</p>
    </div>

</div>

</body>
</html>

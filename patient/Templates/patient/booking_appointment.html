

{% block content %}
<style>
.booking-container {
    max-width: 700px;
    margin: 50px auto;
    padding: 20px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    font-family: Arial, sans-serif;
}

.doctor-info {
    padding: 15px;
    background: #f7f7f7;
    border-radius: 8px;
    margin-bottom: 20px;
}

.doctor-info h3 {
    margin: 0;
    color: #2f80ed;
}

.doctor-info p {
    margin: 4px 0;
    font-size: 14px;
    color: #555;
}

label {
    font-weight: bold;
    display: block;
    margin: 15px 0 5px;
}

input[type="date"] {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.time-slots {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
}

.time-slot {
    border: 2px solid #2f80ed;
    border-radius: 6px;
    padding: 10px 12px;
    width: calc(25% - 10px);
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
}

.time-slot.available {
    background: #fff;
}

.time-slot.selected {
    background: #2f80ed;
    color: #fff;
}

.time-slot span.status {
    display: block;
    font-size: 10px;
    margin-top: 5px;
    color: green;
}

textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    resize: vertical;
}

button.book-btn {
    margin-top: 15px;
    padding: 10px 20px;
    background: #28a745;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button.book-btn:hover {
    background: #218838;
}
</style>


<div class="booking-container">
    <h2>Book Appointment</h2>

    <div class="doctor-info">
        <h3>Dr. {{ doctor.name }}</h3>
        <p><strong>Specialization:</strong> {{ doctor.specialization }}</p>
        <p><strong>Experience:</strong> {{ doctor.experience }} years</p>
    </div>

    <form method="POST" action="{% url 'webpatient:book_appointment' doctor.id %}">
        {% csrf_token %}
        <label for="appointment_date">Select Date:</label>
        <input type="date" id="appointment_date" name="appointment_date" required>

        <label>Available Time Slots:</label>
        <div class="time-slots">
            {% for slot in time_slots %}
                <div class="time-slot available" data-slot="{{ slot }}">
                    {{ slot }} <span class="status">Available</span>
                </div>
            {% empty %}
                <p>No time slots available for this day.</p>
            {% endfor %}
        </div>

        <label for="symptoms">Symptoms / Reason for Visit:</label>
        <textarea id="symptoms" name="symptoms" rows="4" placeholder="Please describe your symptoms or reason for consultation..." required></textarea>

        <button type="submit" class="book-btn">Book Appointment</button>
    </form>
</div>

<script>
    const slots = document.querySelectorAll('.time-slot');
    slots.forEach(slot => {
        slot.addEventListener('click', () => {
            slots.forEach(s => s.classList.remove('selected'));
            slot.classList.add('selected');
            // Store selected slot in hidden input
            let existingInput = document.querySelector('input[name="time_slot"]');
            if (!existingInput) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'time_slot';
                input.value = slot.dataset.slot;
                document.querySelector('form').appendChild(input);
            } else {
                existingInput.value = slot.dataset.slot;
            }
        });
    });
</script>

{% endblock %}
